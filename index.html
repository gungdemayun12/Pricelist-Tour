<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Bali Tour Package — Discover the beauty of Bali with our premium local tour packages. Traditional farming, blessing rituals, and wildlife adventures." />
    <title>Bali Tour Package — Authentic Bali Experiences</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,700&family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet" />

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              gold: { light: '#F0D060', DEFAULT: '#D4AF37', dark: '#A67C00', muted: '#C9A84C' },
              cream: '#FDFAF3',
              'dark-text': '#1A1A1A',
              'secondary-text': '#666666',
            },
            fontFamily: {
              heading: ['"Playfair Display"', 'serif'],
              body: ['"Lato"', 'sans-serif'],
            },
            boxShadow: {
              'gold': '0 4px 20px rgba(212, 175, 55, 0.15)',
              'gold-lg': '0 8px 30px rgba(212, 175, 55, 0.25)',
              'gold-xl': '0 12px 40px rgba(212, 175, 55, 0.3)',
            },
            animation: {
              'fade-in': 'fadeIn 1s ease-out forwards',
              'fade-in-up': 'fadeInUp 0.8s ease-out forwards',
              'float': 'float 3s ease-in-out infinite',
            },
            keyframes: {
              fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
              fadeInUp: { '0%': { opacity: '0', transform: 'translateY(30px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
              float: { '0%, 100%': { transform: 'translateY(0)' }, '50%': { transform: 'translateY(-10px)' } },
            },
          },
        },
      }
    </script>
    <style>
      ::-webkit-scrollbar { width: 8px; }
      ::-webkit-scrollbar-track { background: #FDFAF3; }
      ::-webkit-scrollbar-thumb { background: #D4AF37; border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: #A67C00; }
      html { scroll-behavior: smooth; }
    </style>
  </head>
  <body class="font-body bg-white text-dark-text antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
